<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROTOCOL: BORDERLAND</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');
        :root { --red: #ff0000; --bg: #050505; --gold: #ffd700; }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Special Elite', monospace; overflow: hidden; }

        #camera-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; filter: brightness(0.2); }

        .screen { display: none; position: relative; z-index: 10; height: 100vh; width: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); }
        .active { display: flex; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn { background: rgba(40,40,40,0.8); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 18px; font-size: 1rem; cursor: pointer; width: 90%; margin: 8px 0; text-transform: uppercase; letter-spacing: 2px; }
        .btn:active { background: var(--red); color: black; }
        .btn:disabled { opacity: 0.3; pointer-events: none; }

        /* Identification Pulse */
        .id-circle { width: 180px; height: 180px; border-radius: 50%; border: 5px solid var(--red); object-fit: cover; box-shadow: 0 0 20px var(--red); animation: pulseRed 1.5s infinite; margin-bottom: 15px; }
        @keyframes pulseRed { 0% { box-shadow: 0 0 0px var(--red); } 50% { box-shadow: 0 0 30px var(--red); } 100% { box-shadow: 0 0 0px var(--red); } }

        .lobby-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; overflow-y: auto; padding: 10px; }
        .vote-card { border: 1px solid #444; background: #111; padding: 5px; text-align: center; position: relative; }
        .vote-card img { width: 100%; height: 75px; object-fit: cover; border: 1px solid #333; }
        .v-chip { width: 20px; height: 20px; border-radius: 50%; border: 1px solid white; margin: 1px; }

        /* Cooldown Bar */
        .cd-container { width: 90%; background: #222; height: 8px; margin-top: -5px; margin-bottom: 10px; display: none; }
        .cd-bar { height: 100%; background: var(--red); width: 100%; transition: linear; }

        /* Tablet Modal */
        #tablet-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; padding: 20px; box-sizing: border-box; }
        .tablet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .status-dead { filter: grayscale(1) brightness(0.5); border: 2px solid red !important; }

        #fade-black { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9999; pointer-events: none; opacity: 0; transition: opacity 0.8s; }
    </style>
</head>
<body>

    <video id="camera-bg" autoplay playsinline></video>
    <div id="fade-black"></div>

    <div id="menu-screen" class="screen active">
        <h1 style="color:var(--red); font-size: 3.5rem; letter-spacing: 12px; text-shadow: 0 0 15px red;">PROTOCOL</h1>
        <button class="btn" onclick="startNewGame()">New Game</button>
        <button class="btn" style="opacity:0.5" onclick="location.reload()">Continue</button>
    </div>

    <div id="reg-screen" class="screen">
        <video id="reg-video" class="id-circle" autoplay playsinline></video>
        <div style="margin-bottom: 10px;">
            <button class="btn" style="width:auto; padding: 10px;" onclick="switchCam()">Switch Camera</button>
        </div>
        <input type="text" id="p-name" placeholder="OPERATIVE NAME" style="width:85%; padding:15px; background:#000; color:white; border:1px solid var(--red); margin-bottom:10px; text-align:center;">
        <button class="btn" onclick="registerPlayer()">Identify</button>
        <div id="lobby-list" class="lobby-list" style="max-height: 25vh;"></div>
        <button id="start-btn" class="btn" style="display:none; border-color:var(--gold);" onclick="finalizeLobby()">Initialize Protocol</button>
    </div>

    <div id="pass-screen" class="screen">
        <h2 style="color:var(--red); letter-spacing: 5px;">PASS PHONE TO:</h2>
        <img id="pass-img" class="id-circle">
        <h1 id="pass-name">---</h1>
        <button id="reveal-btn" class="btn">Confirm Identity</button>
    </div>

    <div id="role-screen" class="screen">
        <h1 style="font-size:1.5rem;">YOUR ROLE IS:</h1>
        <h2 id="role-title" style="font-size:4rem; margin: 20px 0;">---</h2>
        <button class="btn" onclick="playSfx('btn'); finishRoleTurn()">Keep Secret</button>
    </div>

    <div id="game-screen" class="screen">
        <div style="width:100%; display:flex; justify-content:space-between; align-items:center;">
            <h3 id="round-label">R1/10</h3>
            <button class="btn" style="width:60px; margin:0;" onclick="openTablet()">📱</button>
        </div>
        <img id="gp-img" class="id-circle" style="width:140px; height:140px;">
        <h2 id="gp-name">---</h2>
        
        <div id="action-ui" style="width:100%;">
            <button id="kill-btn" class="btn" style="color:red; border-color:red;" onclick="showTargets()">Eliminate</button>
            <div id="cd-container" class="cd-container"><div id="cd-bar" class="cd-bar"></div></div>
            <p id="cd-text" style="color:red; font-size:0.8rem; margin-top:-5px; display:none;">RELOADING: <span id="cd-sec">0</span>s</p>
        </div>

        <button class="btn" onclick="doTask()">Task (<span id="task-val">0</span>/2)</button>
        <button class="btn" style="opacity:0.4; border:none;" onclick="endTurn()">Skip</button>
    </div>

    <div id="vote-screen" class="screen">
        <h2 style="font-size:1.2rem;">Voter: <span id="voter-name" style="color:red">---</span></h2>
        <div id="vote-list" class="lobby-list"></div>
        <button class="btn" style="border-color:gray" onclick="recordVote(-1)">Abstain</button>
    </div>

    <div id="vote-summary-screen" class="screen">
        <h2 style="color:red; letter-spacing:5px;">VOTE TELEMETRY</h2>
        <div id="summary-list" class="lobby-list"></div>
        <button class="btn" onclick="finishVotePhase()">Proceed to Next Round</button>
    </div>

    <div id="win-screen" class="screen">
        <h1 id="win-msg" style="text-align:center; font-size:2.5rem; text-shadow:0 0 10px white;">---</h1>
        <div id="win-pics" style="display:flex; justify-content:center; align-items:center; gap:20px; margin: 20px 0;"></div>
        <button class="btn" onclick="location.reload()">Restart Protocol</button>
    </div>

    <div id="tablet-modal">
        <h2 style="text-align:center; color:var(--red);">OPERATIVE STATUS</h2>
        <div id="tablet-grid" class="tablet-grid"></div>
        <button class="btn" onclick="closeTablet()">Close</button>
    </div>

    <div id="target-selector" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:5000; padding:20px; box-sizing:border-box;">
        <h2 style="color:red; text-align:center;">ACQUIRE TARGET</h2>
        <div id="target-btns" class="lobby-list"></div>
        <button class="btn" onclick="document.getElementById('target-selector').style.display='none'">Abort</button>
    </div>

    <script>
        let players = [];
        let currentIdx = 0;
        let round = 1;
        let votingIdx = 0;
        let votes = {};
        let sequence = [];
        let currentFacingMode = "user";
        
        const winSound = new Audio('win.mp3');
        const btnSfx = new Audio('https://www.soundjay.com/buttons/sounds/button-16.mp3');
        const roleSfx = new Audio('https://www.soundjay.com/buttons/sounds/button-3.mp3');

        function playSfx(type) { if(type==='btn') btnSfx.play(); else roleSfx.play(); }

        function transition(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function speak(txt) {
            const u = new SpeechSynthesisUtterance(txt);
            u.rate = 0.8; u.pitch = 0.6;
            window.speechSynthesis.speak(u);
        }

        async function startNewGame() {
            transition('reg-screen');
            startCamera();
        }

        async function startCamera() {
            if(window.stream) window.stream.getTracks().forEach(t => t.stop());
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode }});
            window.stream = s;
            document.getElementById('reg-video').srcObject = s;
            document.getElementById('camera-bg').srcObject = s;
        }

        function switchCam() {
            currentFacingMode = currentFacingMode === "user" ? "environment" : "user";
            startCamera();
        }

        function registerPlayer() {
            const name = document.getElementById('p-name').value;
            if(!name) return;
            const canvas = document.createElement('canvas'); canvas.width = 300; canvas.height = 300;
            canvas.getContext('2d').drawImage(document.getElementById('reg-video'), 0, 0, 300, 300);
            const img = canvas.toDataURL();
            players.push({ name, img, role: '', alive: true, tasks: 0, cd: 0 });
            document.getElementById('lobby-list').innerHTML += `<div class="vote-card"><img src="${img}"><p style="font-size:0.6rem;">${name}</p></div>`;
            document.getElementById('p-name').value = "";
            speak("Operative " + name + " identified.");
            if(players.length >= 3) document.getElementById('start-btn').style.display = 'block';
        }

        function finalizeLobby() {
            let roles = ['Murderer', 'Sheriff']; while(roles.length < players.length) roles.push('Innocent');
            roles = roles.sort(() => Math.random() - 0.5);
            players.forEach((p, i) => p.role = roles[i]);
            currentIdx = 0; startRolePass();
        }

        function startRolePass() {
            transition('pass-screen');
            document.getElementById('pass-name').innerText = players[currentIdx].name;
            document.getElementById('pass-img').src = players[currentIdx].img;
            document.getElementById('reveal-btn').onclick = () => {
                playSfx('role');
                transition('role-screen');
                const p = players[currentIdx];
                const rt = document.getElementById('role-title');
                rt.innerText = p.role.toUpperCase();
                rt.style.color = p.role === 'Murderer' ? 'red' : (p.role === 'Sheriff' ? 'gold' : 'white');
            };
        }

        function finishRoleTurn() {
            currentIdx++;
            if(currentIdx < players.length) startRolePass();
            else { currentIdx = 0; startRound(); }
        }

        function startRound() {
            if(round > 10) { showWin("PROTOCOL FAILED - TIME EXPIRED", players[0], players[1]); return; }
            sequence = players.map((_, i) => i).filter(i => players[i].alive).sort(() => Math.random() - 0.5);
            currentIdx = 0; playTurn();
        }

        function playTurn() {
            const p = players[sequence[currentIdx]];
            transition('pass-screen');
            document.getElementById('pass-name').innerText = p.name;
            document.getElementById('pass-img').src = p.img;
            document.getElementById('reveal-btn').onclick = () => {
                playSfx('btn');
                transition('game-screen');
                document.getElementById('round-label').innerText = `R${round}/10`;
                document.getElementById('gp-name').innerText = p.name;
                document.getElementById('gp-img').src = p.img;
                document.getElementById('task-val').innerText = p.tasks;
                
                const kBtn = document.getElementById('kill-btn');
                if(p.role === 'Innocent') kBtn.style.display = 'none';
                else {
                    kBtn.style.display = 'block';
                    kBtn.innerText = p.role === 'Murderer' ? 'Eliminate' : 'Execute';
                    updateCDUI(p);
                }
            };
        }

        function updateCDUI(p) {
            const kBtn = document.getElementById('kill-btn');
            const cdC = document.getElementById('cd-container');
            const cdT = document.getElementById('cd-text');
            if(p.cd > 0) {
                kBtn.disabled = true; cdC.style.display = 'block'; cdT.style.display = 'block';
                document.getElementById('cd-sec').innerText = p.cd;
                document.getElementById('cd-bar').style.width = (p.cd / (p.role==='Murderer'?20:30)*100) + "%";
            } else { kBtn.disabled = false; cdC.style.display = 'none'; cdT.style.display = 'none'; }
        }

        function doTask() {
            playSfx('btn');
            const p = players[sequence[currentIdx]];
            p.tasks++; document.getElementById('task-val').innerText = p.tasks;
            if(p.tasks >= 2) setTimeout(endTurn, 500);
        }

        function showTargets() {
            playSfx('btn');
            document.getElementById('target-selector').style.display = 'block';
            const btns = document.getElementById('target-btns');
            btns.innerHTML = "";
            players.forEach((p, i) => {
                if(p.alive && i !== sequence[currentIdx]) {
                    btns.innerHTML += `<div class="vote-card" onclick="kill(${i})"><img src="${p.img}"><p>${p.name}</p></div>`;
                }
            });
        }

        function kill(idx) {
            const shooter = players[sequence[currentIdx]];
            if(shooter.role === 'Murderer') {
                players[idx].alive = false; shooter.cd = 20;
            } else {
                if(players[idx].role === 'Murderer') players[idx].alive = false;
                else shooter.alive = false;
                shooter.cd = 30;
            }
            startCDTimer(sequence[currentIdx]);
            document.getElementById('target-selector').style.display = 'none';
            endTurn();
        }

        function startCDTimer(idx) {
            let itv = setInterval(() => {
                if(players[idx].cd > 0) players[idx].cd--;
                else clearInterval(itv);
            }, 1000);
        }

        function endTurn() {
            players[sequence[currentIdx]].tasks = 0;
            currentIdx++;
            if(currentIdx < sequence.length) playTurn();
            else checkVoting();
        }

        function checkVoting() {
            if(checkWinCondition()) return;
            votingIdx = 0; votes = {};
            players.forEach((p,i) => { if(p.alive) votes[i] = []; });
            votes[-1] = [];
            startVotingTurn();
        }

        function startVotingTurn() {
            const alive = players.map((_, i) => i).filter(i => players[i].alive);
            const voter = players[alive[votingIdx]];
            transition('pass-screen');
            document.getElementById('pass-name').innerText = voter.name;
            document.getElementById('pass-img').src = voter.img;
            document.getElementById('reveal-btn').onclick = () => {
                transition('vote-screen');
                document.getElementById('voter-name').innerText = voter.name;
                const list = document.getElementById('vote-list');
                list.innerHTML = "";
                players.forEach((p, i) => {
                    if(p.alive) list.innerHTML += `<div class="vote-card" onclick="recordVote(${i})"><img src="${p.img}"><div class="vote-chips" id="chips-${i}"></div><p>${p.name}</p></div>`;
                });
            };
        }

        function recordVote(tIdx) {
            const alive = players.map((_, i) => i).filter(i => players[i].alive);
            const voter = players[alive[votingIdx]];
            votes[tIdx].push(voter.img);
            votingIdx++;
            if(votingIdx < alive.length) startVotingTurn();
            else showSummary();
        }

        function showSummary() {
            transition('vote-summary-screen');
            const list = document.getElementById('summary-list');
            list.innerHTML = "";
            let max = 0; let victim = -1; let tie = false;
            players.forEach((p, i) => {
                if(p.alive) {
                    const count = votes[i].length;
                    let chips = ''; votes[i].forEach(img => chips += `<img src="${img}" class="v-chip">`);
                    list.innerHTML += `<div class="vote-card"><img src="${p.img}"><p>${p.name}</p><div class="vote-chips">${chips}</div></div>`;
                    if(count > max) { max = count; victim = i; tie = false; }
                    else if(count === max && max > 0) tie = true;
                }
            });
            if(!tie && victim !== -1) players[victim].alive = false;
        }

        function finishVotePhase() {
            if(!checkWinCondition()) { 
                document.getElementById('fade-black').style.opacity = '1';
                setTimeout(() => {
                    round++; startRound();
                    document.getElementById('fade-black').style.opacity = '0';
                }, 800);
            }
        }

        function checkWinCondition() {
            const alive = players.filter(p => p.alive);
            const m = players.find(p => p.role === 'Murderer');
            const s = players.find(p => p.role === 'Sheriff');

            if(!m.alive) { showWin("HERO SAVE THE DAY", s, m); return true; }
            if(alive.length <= 2) { showWin("MURDERER WINS", m, s); return true; }
            return false;
        }

        function showWin(msg, winner, loser) {
            transition('win-screen');
            document.getElementById('win-msg').innerText = msg;
            speak(msg); winSound.play();
            const container = document.getElementById('win-pics');
            container.innerHTML = `
                <div style="text-align:center;"><img src="${winner.img}" class="id-circle" style="border-color:gold;"><p>WINNER</p></div>
                <div style="text-align:center;"><img src="${loser.img}" class="id-circle" style="border-color:red; filter:grayscale(1); animation:pulseRed 0.5s infinite;"><p>LOSER</p></div>
            `;
        }

        function openTablet() {
            const grid = document.getElementById('tablet-grid');
            grid.innerHTML = "";
            players.forEach(p => {
                grid.innerHTML += `<div class="vote-card ${p.alive?'':'status-dead'}"><img src="${p.img}"><p>${p.name}</p></div>`;
            });
            document.getElementById('tablet-modal').style.display = 'block';
        }
        function closeTablet() { document.getElementById('tablet-modal').style.display = 'none'; }
    </script>
</body>
</html>
