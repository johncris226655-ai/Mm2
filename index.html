<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROTOCOL: BORDERLAND</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');
        :root { --red: #ff0000; --bg: #050505; --paper: #e0e0e0; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: #e0e0e0; 
            font-family: 'Special Elite', monospace;
            overflow: hidden; touch-action: manipulation;
        }

        #camera-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; filter: brightness(0.1); }

        .screen { 
            display: none; position: relative; z-index: 10; height: 100vh; width: 100%; 
            flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; 
            background: rgba(10,10,10,0.95); backdrop-filter: blur(5px);
        }
        .active { display: flex; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn { 
            background: rgba(40,40,40,0.7); border: 1px solid rgba(255,255,255,0.2); color: white; 
            padding: 18px; font-size: 1.1rem; cursor: pointer; width: 90%;
            margin: 10px 0; text-transform: uppercase; letter-spacing: 2px;
        }
        .btn:active { background: var(--red); color: black; }

        /* Identification Red Pulse */
        .id-ring {
            width: 220px; height: 220px; border-radius: 50%;
            border: 5px solid var(--red);
            box-shadow: 0 0 20px var(--red);
            animation: pulse 1.5s infinite;
            object-fit: cover;
        }
        @keyframes pulse { 
            0% { box-shadow: 0 0 0px var(--red); } 
            50% { box-shadow: 0 0 30px var(--red); } 
            100% { box-shadow: 0 0 0px var(--red); } 
        }

        .lobby-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; overflow-y: auto; }
        .vote-card { border: 1px solid #444; background: #111; padding: 5px; text-align: center; }
        .vote-card img { width: 100%; height: 80px; object-fit: cover; }
        
        /* Voting Chips */
        .vote-chips { display: flex; flex-wrap: wrap; gap: 2px; justify-content: center; min-height: 20px; margin-top: 5px; }
        .v-chip { width: 20px; height: 20px; border-radius: 50%; border: 1px solid white; object-fit: cover; }

        /* Side-by-Side Win Pics */
        .win-container { display: flex; align-items: center; gap: 20px; margin-top: 20px; }
        .win-box { text-align: center; }
        .win-box img { width: 130px; height: 130px; object-fit: cover; border: 4px solid white; }
        .winner-murderer { border-color: red !important; box-shadow: 0 0 25px red; animation: pulse 1s infinite; }

        #fade-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9999; pointer-events: none; opacity: 0; transition: opacity 0.5s; }
    </style>
</head>
<body>

    <video id="camera-bg" autoplay playsinline></video>
    <div id="fade-overlay"></div>

    <div id="menu-screen" class="screen active">
        <h1 style="color:var(--red); font-size: 3.5rem; letter-spacing: 15px; text-shadow: 0 0 15px red;">PROTOCOL</h1>
        <button class="btn" onclick="startNewGame()">New Game</button>
    </div>

    <div id="reg-screen" class="screen">
        <video id="reg-video" class="id-ring"></video>
        <input type="text" id="p-name" placeholder="OPERATIVE NAME" style="width:80%; padding:15px; margin:20px 0; background:#000; color:white; border:1px solid #444; text-align:center;">
        <button class="btn" onclick="registerPlayer()">Identify</button>
        <div id="lobby-list" class="lobby-list" style="margin-top:10px; max-height: 20vh;"></div>
        <button id="start-btn" class="btn" style="display:none; border-color:red;" onclick="finalizeLobby()">Start Protocol</button>
    </div>

    <div id="pass-screen" class="screen">
        <h2 style="color:var(--red); letter-spacing: 5px;">PASS TO:</h2>
        <img id="pass-img" style="width:180px; height:180px; border-radius:50%; object-fit:cover; border:4px solid white;">
        <h1 id="pass-name">---</h1>
        <button id="reveal-btn" class="btn">Confirm Identity</button>
    </div>

    <div id="role-screen" class="screen">
        <h2 id="role-title" style="font-size:3.5rem; letter-spacing:10px;">ROLE</h2>
        <button class="btn" onclick="finishRoleTurn()">Confirm & Hide</button>
    </div>

    <div id="game-screen" class="screen">
        <h2 id="round-label" style="color:red;">R1</h2>
        <img id="gp-img" style="width:150px; height:150px; border:3px solid red; object-fit:cover;">
        <h2 id="gp-name">---</h2>
        <div id="action-ui" style="width:100%;">
            <button id="kill-btn" class="btn" style="color:red; border-color:red;" onclick="showTargets()">Eliminate</button>
        </div>
        <button class="btn" onclick="doTask()">Task (<span id="task-val">0</span>/2)</button>
        <button class="btn" style="opacity:0.4" onclick="endTurn()">Skip Turn</button>
    </div>

    <div id="vote-screen" class="screen">
        <h2 style="font-size:1.2rem;">Discussion Phase: <span id="voter-name" style="color:red">---</span></h2>
        <div id="vote-list" class="lobby-list"></div>
        <button class="btn" style="border-color:gray" onclick="recordVote(-1)">Skip Vote</button>
    </div>

    <div id="vote-summary-screen" class="screen">
        <h2 style="color:red; letter-spacing:5px;">VOTE RESULT</h2>
        <div id="summary-list" class="lobby-list"></div>
        <button class="btn" onclick="finishVotePhase()">Proceed to Next Round</button>
    </div>

    <div id="win-screen" class="screen">
        <h1 id="win-msg" style="text-align:center; font-size:2rem; color:white;">---</h1>
        <div id="win-pics" class="win-container"></div>
        <button class="btn" style="margin-top:30px;" onclick="location.reload()">Restart Game</button>
    </div>

    <div id="target-selector" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:10000; padding:20px; box-sizing:border-box;">
        <h2 style="color:red; text-align:center;">ACQUIRE TARGET</h2>
        <div id="target-btns" class="lobby-list"></div>
        <button class="btn" onclick="document.getElementById('target-selector').style.display='none'">Abort</button>
    </div>

    <script>
        let players = [];
        let currentIdx = 0;
        let round = 1;
        let votingIdx = 0;
        let votes = {};
        let sequence = [];

        const winSfx = new Audio('win.mp3');
        const roleSfx = new Audio('https://www.soundjay.com/buttons/sounds/button-16.mp3');

        function aiSpeak(txt) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(txt);
            utter.rate = 0.85; utter.pitch = 0.6;
            synth.speak(utter);
        }

        function smoothTransition(id) {
            const overlay = document.getElementById('fade-overlay');
            overlay.style.opacity = '1';
            setTimeout(() => {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                overlay.style.opacity = '0';
            }, 500);
        }

        async function startNewGame() {
            smoothTransition('reg-screen');
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }});
            document.getElementById('reg-video').srcObject = stream;
            document.getElementById('camera-bg').srcObject = stream;
        }

        function registerPlayer() {
            const name = document.getElementById('p-name').value;
            if(!name) return;
            const canvas = document.createElement('canvas'); canvas.width = 300; canvas.height = 300;
            canvas.getContext('2d').drawImage(document.getElementById('reg-video'), 0, 0, 300, 300);
            const img = canvas.toDataURL();
            players.push({ name, img, role: '', alive: true, tasks: 0 });
            document.getElementById('lobby-list').innerHTML += `<div class="vote-card"><img src="${img}"><p>${name}</p></div>`;
            document.getElementById('p-name').value = "";
            aiSpeak("Operative " + name + " identified.");
            if(players.length >= 3) document.getElementById('start-btn').style.display = 'block';
        }

        function finalizeLobby() {
            let roles = ['Murderer', 'Sheriff']; while(roles.length < players.length) roles.push('Innocent');
            roles = roles.sort(() => Math.random() - 0.5);
            players.forEach((p, i) => p.role = roles[i]);
            currentIdx = 0;
            startRolePass();
        }

        function startRolePass() {
            smoothTransition('pass-screen');
            document.getElementById('pass-name').innerText = players[currentIdx].name;
            document.getElementById('pass-img').src = players[currentIdx].img;
            document.getElementById('reveal-btn').onclick = () => {
                roleSfx.play();
                smoothTransition('role-screen');
                const p = players[currentIdx];
                document.getElementById('role-title').innerText = p.role.toUpperCase();
                document.getElementById('role-title').style.color = p.role === 'Murderer' ? 'red' : (p.role === 'Sheriff' ? 'gold' : 'white');
            };
        }

        function finishRoleTurn() {
            currentIdx++;
            if(currentIdx < players.length) startRolePass();
            else { currentIdx = 0; startRound(); }
        }

        function startRound() {
            if (round > 10) { checkWin(true); return; }
            sequence = players.map((_, i) => i).filter(i => players[i].alive).sort(() => Math.random() - 0.5);
            currentIdx = 0;
            playTurn();
        }

        function playTurn() {
            const p = players[sequence[currentIdx]];
            smoothTransition('pass-screen');
            document.getElementById('pass-name').innerText = p.name;
            document.getElementById('pass-img').src = p.img;
            document.getElementById('reveal-btn').onclick = () => {
                smoothTransition('game-screen');
                document.getElementById('round-label').innerText = "PROTOCOL ROUND " + round;
                document.getElementById('gp-name').innerText = p.name;
                document.getElementById('gp-img').src = p.img;
                document.getElementById('task-val').innerText = p.tasks;
                document.getElementById('kill-btn').style.display = (p.role === 'Innocent') ? 'none' : 'block';
            };
        }

        function doTask() {
            const p = players[sequence[currentIdx]];
            p.tasks++; document.getElementById('task-val').innerText = p.tasks;
            if(p.tasks >= 2) endTurn();
        }

        function showTargets() {
            document.getElementById('target-selector').style.display = 'block';
            const btns = document.getElementById('target-btns');
            btns.innerHTML = "";
            players.forEach((p, i) => {
                if(p.alive && i !== sequence[currentIdx]) {
                    btns.innerHTML += `<div class="vote-card" onclick="kill(${i})"><img src="${p.img}"><p>${p.name}</p></div>`;
                }
            });
        }

        function kill(idx) {
            const shooter = players[sequence[currentIdx]];
            if(shooter.role === 'Murderer') players[idx].alive = false;
            else if(shooter.role === 'Sheriff') {
                if(players[idx].role === 'Murderer') players[idx].alive = false;
                else shooter.alive = false; 
            }
            document.getElementById('target-selector').style.display = 'none';
            endTurn();
        }

        function endTurn() {
            players[sequence[currentIdx]].tasks = 0;
            currentIdx++;
            if(currentIdx < sequence.length) playTurn();
            else { if(!checkWin()) checkVoting(); }
        }

        function checkVoting() {
            votingIdx = 0; votes = {};
            players.forEach((p,i) => { if(p.alive) votes[i] = []; });
            votes[-1] = [];
            startVotingTurn();
        }

        function startVotingTurn() {
            const alive = players.map((_, i) => i).filter(i => players[i].alive);
            const voter = players[alive[votingIdx]];
            smoothTransition('pass-screen');
            document.getElementById('pass-name').innerText = voter.name;
            document.getElementById('pass-img').src = voter.img;
            document.getElementById('reveal-btn').onclick = () => {
                smoothTransition('vote-screen');
                document.getElementById('voter-name').innerText = voter.name;
                const list = document.getElementById('vote-list');
                list.innerHTML = "";
                players.forEach((p, i) => {
                    if(p.alive) list.innerHTML += `<div class="vote-card" onclick="recordVote(${i})"><img src="${p.img}"><p>${p.name}</p></div>`;
                });
            };
        }

        function recordVote(targetIdx) {
            const alive = players.map((_, i) => i).filter(i => players[i].alive);
            const voter = players[alive[votingIdx]];
            if(targetIdx !== -1) votes[targetIdx].push(voter.img);
            votingIdx++;
            if(votingIdx < alive.length) startVotingTurn();
            else showSummary();
        }

        function showSummary() {
            smoothTransition('vote-summary-screen');
            const list = document.getElementById('summary-list');
            list.innerHTML = "";
            let max = 0; let victim = -1; let tie = false;

            players.forEach((p, i) => {
                if(p.alive) {
                    const count = votes[i].length;
                    let chips = ''; 
                    votes[i].forEach(img => chips += `<img src="${img}" class="v-chip">`);
                    list.innerHTML += `<div class="vote-card"><img src="${p.img}"><p>${p.name}</p><div class="vote-chips">${chips}</div></div>`;
                    if(count > max) { max = count; victim = i; tie = false; }
                    else if(count === max && max > 0) tie = true;
                }
            });

            if(!tie && victim !== -1) {
                players[victim].alive = false;
                aiSpeak(players[victim].name + " has been eliminated.");
            } else {
                aiSpeak("No consensus reached.");
            }
        }

        function finishVotePhase() {
            if(!checkWin()) { round++; startRound(); }
        }

        function checkWin(forceEnd = false) {
            const alive = players.filter(p => p.alive);
            const murderer = players.find(p => p.role === 'Murderer');
            const sheriff = players.find(p => p.role === 'Sheriff');

            if(!murderer.alive) {
                showWin("HERO SAVED THE DAY", sheriff, murderer);
                return true;
            }
            if(alive.length <= 2 || forceEnd) {
                showWin("MURDERER WINS", murderer, sheriff);
                return true;
            }
            return false;
        }

        function showWin(msg, winner, loser) {
            smoothTransition('win-screen');
            winSfx.play();
            aiSpeak(msg);
            document.getElementById('win-msg').innerText = msg;
            
            // Side-by-side winning/losing pics
            const container = document.getElementById('win-pics');
            container.innerHTML = `
                <div class="win-box">
                    <img src="${winner.img}" class="${winner.role === 'Murderer' ? 'winner-murderer' : ''}">
                    <p>${winner.role.toUpperCase()}</p>
                </div>
                <div class="win-box">
                    <img src="${loser.img}" style="filter:grayscale(1); opacity:0.6;">
                    <p style="text-decoration:line-through;">${loser.role.toUpperCase()}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
