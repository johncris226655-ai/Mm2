<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROTOCOL: BORDERLAND</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap');
        :root { --red: #bc0000; --blue: #005bc4; --gold: #FFD700; --bg: #0a0a0a; --paper: #c4c4c4; }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--paper); font-family: 'Courier Prime', monospace; overflow: hidden; }

        #camera-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; filter: brightness(0.15) contrast(1.2); }

        .screen { display: none; position: relative; z-index: 10; height: 100vh; width: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; background: rgba(5,5,5,0.9); }
        .active { display: flex; animation: flicker 0.1s infinite; }
        @keyframes flicker { 0% { opacity: 0.98; } 100% { opacity: 1; } }

        .btn { background: transparent; border: 1px solid var(--paper); color: var(--paper); padding: 15px; font-size: 0.9rem; cursor: pointer; width: 90%; margin: 8px 0; text-transform: uppercase; letter-spacing: 3px; font-family: 'Special Elite'; transition: transform 0.1s; }
        .btn:active { transform: scale(0.95); background: var(--paper); color: black; }
        
        .btn-murderer { border-color: var(--red) !important; color: var(--red) !important; box-shadow: 0 0 15px var(--red); }
        .btn-sheriff { border-color: var(--gold) !important; color: var(--gold) !important; box-shadow: 0 0 15px var(--gold); }

        .doc-header { border-bottom: 2px solid var(--paper); width: 90%; margin-bottom: 20px; padding-bottom: 5px; text-transform: uppercase; font-weight: bold; font-size: 0.8rem; letter-spacing: 5px; }
        
        .id-frame { width: 150px; height: 150px; border: 2px solid var(--paper); padding: 5px; background: #000; }
        .id-frame img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); }
        
        /* Side-by-Side Ending */
        .showdown-container { display: flex; gap: 20px; justify-content: center; align-items: center; width: 100%; margin: 20px 0; }
        .player-card { text-align: center; width: 140px; }
        .win-glow-red { border-color: var(--red) !important; box-shadow: 0 0 30px var(--red); animation: pulseRed 1s infinite; }
        .win-glow-gold { border-color: var(--gold) !important; box-shadow: 0 0 30px var(--gold); animation: pulseGold 1s infinite; }
        
        @keyframes pulseRed { 0% { box-shadow: 0 0 10px var(--red); } 50% { box-shadow: 0 0 40px var(--red); } 100% { box-shadow: 0 0 10px var(--red); } }
        @keyframes pulseGold { 0% { box-shadow: 0 0 10px var(--gold); } 50% { box-shadow: 0 0 40px var(--gold); } 100% { box-shadow: 0 0 10px var(--gold); } }

        .lobby-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; }
        .vote-card { border: 1px solid #333; background: #000; padding: 5px; text-align: center; }
        .vote-card img { width: 100%; height: 60px; object-fit: cover; }

        #notify-toast { position: fixed; top: 10%; left: 50%; transform: translateX(-50%); background: var(--gold); color: black; padding: 10px 20px; font-family: 'Special Elite'; z-index: 10000; display: none; border: 2px solid white; }
        #fade-black { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9999; pointer-events: none; opacity: 0; transition: opacity 0.5s; }
    </style>
</head>
<body>

    <video id="camera-bg" autoplay playsinline muted></video>
    <div id="fade-black"></div>
    <div id="notify-toast">WEAPON ACQUIRED</div>

    <div id="menu-screen" class="screen active">
        <div class="doc-header">Protocol: Classified</div>
        <h1 style="font-size: 2.2rem; letter-spacing: 10px;">BORDERLAND</h1>
        <button class="btn" onclick="initAudio(); startNewGame()">Initiate Sequence</button>
    </div>

    <div id="reg-screen" class="screen">
        <div class="doc-header">Enrollment</div>
        <video id="reg-video" autoplay playsinline style="width:150px; height:150px; border:1px solid var(--paper); object-fit:cover; margin-bottom:10px;"></video>
        <input type="text" id="p-name" placeholder="ENTRY NAME" style="width:80%; padding:10px; background:transparent; color:var(--paper); border:1px solid var(--paper); margin-bottom:10px; text-align:center; font-family:'Courier Prime';">
        <button class="btn" onclick="playSfx('click'); registerPlayer()">Capture</button>
        <div id="lobby-list" class="lobby-list" style="max-height: 25vh; overflow-y: auto;"></div>
        <button id="start-btn" class="btn" style="display:none; border-color:var(--red);" onclick="finalizeLobby()">Execute</button>
    </div>

    <div id="pass-screen" class="screen">
        <div class="doc-header">Secure Handover</div>
        <h1 id="pass-name" style="letter-spacing: 5px;">---</h1>
        <div class="id-frame"><img id="pass-img"></div>
        <button id="reveal-btn" class="btn">Access Data</button>
    </div>

    <div id="role-screen" class="screen">
        <div class="doc-header">Briefing</div>
        <h1 id="role-title" style="font-size:2.5rem; letter-spacing:5px;">---</h1>
        <p id="role-desc" style="font-size:0.7rem; text-align:center; padding:0 30px;"></p>
        <button class="btn" onclick="playSfx('click'); finishRoleTurn()">Acknowledge</button>
    </div>

    <div id="game-screen" class="screen">
        <div style="width:100%; display:flex; justify-content:space-between; border-bottom:1px solid #333;">
            <p id="round-label">PHASE 01</p>
            <p onclick="openTablet()" style="cursor:pointer;">[DATA_LOG]</p>
        </div>
        <div class="id-frame" style="width:100px; height:100px; margin-top:20px;"><img id="gp-img"></div>
        <h2 id="gp-name">---</h2>
        <div id="action-ui" style="width:100%;">
            <button id="kill-btn" class="btn" onclick="playSfx('click'); showTargets()"></button>
        </div>
        <button class="btn" onclick="playSfx('click'); doTask()">Contract (<span id="task-val">0</span>/2)</button>
        <button class="btn" style="opacity:0.3" onclick="endTurn()">Skip</button>
    </div>

    <div id="vote-screen" class="screen">
        <div class="doc-header">Ballot</div>
        <p>VOTER: <span id="voter-name" style="color:var(--red)">---</span></p>
        <div id="vote-list" class="lobby-list"></div>
        <button class="btn" style="opacity:0.5" onclick="recordVote(-1)">Abstain</button>
    </div>

    <div id="win-screen" class="screen">
        <div class="doc-header">Final telemetry</div>
        <h1 id="win-msg" style="text-align:center; font-size:1.5rem;">---</h1>
        <div id="showdown" class="showdown-container"></div>
        <button class="btn" onclick="location.reload()">Reset</button>
    </div>

    <div id="target-selector" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); z-index:5000; padding:20px; box-sizing:border-box;">
        <div class="doc-header">Eliminate Target</div>
        <div id="target-btns" class="lobby-list"></div>
        <button class="btn" onclick="document.getElementById('target-selector').style.display='none'">Abort</button>
    </div>

    <script>
        let players = [];
        let currentIdx = 0;
        let round = 1;
        let votingIdx = 0;
        let votes = {};
        let sequence = [];

        const sfx = {
            click: new Audio('https://www.soundjay.com/buttons/sounds/button-37.mp3'),
            win: new Audio('https://cdn.discordapp.com/attachments/1489990746575736923/1493153771990286436/win.mp3?ex=69ddef50&is=69dc9dd0&hm=7ae48bcf531f795e0f0e63d695c857c2e3a053f9b5dc208d09c6fabda2f9f05b&')
        };

        function initAudio() { Object.values(sfx).forEach(a => { a.play(); a.pause(); }); }
        function playSfx(k) { sfx[k].currentTime = 0; sfx[k].play().catch(()=>{}); }

        function transition(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function startNewGame() {
            transition('reg-screen');
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }});
            document.getElementById('reg-video').srcObject = s;
            document.getElementById('camera-bg').srcObject = s;
        }

        function registerPlayer() {
            const name = document.getElementById('p-name').value;
            if(!name) return;
            const canvas = document.createElement('canvas'); canvas.width = 300; canvas.height = 300;
            canvas.getContext('2d').drawImage(document.getElementById('reg-video'), 0, 0, 300, 300);
            players.push({ name: name.toUpperCase(), img: canvas.toDataURL(), role: '', alive: true, tasks: 0 });
            document.getElementById('lobby-list').innerHTML += `<div class="vote-card"><img src="${players[players.length-1].img}"><p style="font-size:0.5rem">${name.toUpperCase()}</p></div>`;
            document.getElementById('p-name').value = "";
            if(players.length >= 3) document.getElementById('start-btn').style.display = 'block';
        }

        function finalizeLobby() {
            let roles = ['Murderer', 'Sheriff']; while(roles.length < players.length) roles.push('Innocent');
            roles = roles.sort(() => Math.random() - 0.5);
            players.forEach((p, i) => p.role = roles[i]);
            startRolePass();
        }

        function startRolePass() {
            transition('pass-screen');
            const p = players[currentIdx];
            document.getElementById('pass-name').innerText = p.name;
            document.getElementById('pass-img').src = p.img;
            document.getElementById('reveal-btn').onclick = () => {
                transition('role-screen');
                const t = document.getElementById('role-title');
                t.innerText = p.role.toUpperCase();
                t.style.color = p.role === 'Murderer' ? 'var(--red)' : (p.role === 'Sheriff' ? 'var(--gold)' : 'white');
                document.getElementById('role-desc').innerText = p.role === 'Murderer' ? "ELIMINATE ALL. DO NOT GET CAUGHT." : (p.role === 'Sheriff' ? "IDENTIFY AND SHOOT THE MURDERER." : "DO TASKS. SURVIVE.");
            };
        }

        function finishRoleTurn() {
            currentIdx++;
            if(currentIdx < players.length) startRolePass(); else startRound();
        }

        function startRound() {
            sequence = players.map((_, i) => i).filter(i => players[i].alive);
            currentIdx = 0; playTurn();
        }

        function playTurn() {
            if (currentIdx >= sequence.length) { checkVoting(); return; }
            const p = players[sequence[currentIdx]];
            transition('pass-screen');
            document.getElementById('pass-name').innerText = p.name;
            document.getElementById('pass-img').src = p.img;
            document.getElementById('reveal-btn').onclick = () => {
                transition('game-screen');
                const kBtn = document.getElementById('kill-btn');
                document.getElementById('gp-name').innerText = p.name;
                document.getElementById('gp-img').src = p.img;
                document.getElementById('task-val').innerText = p.tasks;
                if(p.role === 'Murderer') { kBtn.style.display = 'block'; kBtn.innerText = "KILL TARGET"; kBtn.className = "btn btn-murderer"; }
                else if(p.role === 'Sheriff') { kBtn.style.display = 'block'; kBtn.innerText = "SHOOT TARGET"; kBtn.className = "btn btn-sheriff"; }
                else { kBtn.style.display = 'none'; }
            };
        }

        function doTask() {
            const p = players[sequence[currentIdx]];
            p.tasks++; document.getElementById('task-val').innerText = p.tasks;
            if(p.tasks >= 2) endTurn();
        }

        function showTargets() {
            document.getElementById('target-selector').style.display = 'block';
            const btns = document.getElementById('target-btns'); btns.innerHTML = "";
            players.forEach((p, i) => {
                if(p.alive && i !== sequence[currentIdx]) btns.innerHTML += `<div class="vote-card" onclick="kill(${i})"><img src="${p.img}"><p style="font-size:0.5rem">${p.name}</p></div>`;
            });
        }

        function kill(idx) {
            const shooter = players[sequence[currentIdx]];
            if(shooter.role === 'Murderer') { players[idx].alive = false; }
            else {
                if(players[idx].role === 'Murderer') players[idx].alive = false;
                else { shooter.alive = false; transferGun(); }
            }
            document.getElementById('target-selector').style.display = 'none';
            endTurn();
        }

        function transferGun() {
            const candidates = players.filter(p => p.alive && p.role === 'Innocent');
            if(candidates.length > 0) {
                const lucky = candidates[Math.floor(Math.random() * candidates.length)];
                lucky.role = 'Sheriff';
                const t = document.getElementById('notify-toast'); t.style.display = 'block';
                setTimeout(() => t.style.display = 'none', 3000);
            }
        }

        function endTurn() {
            players[sequence[currentIdx]].tasks = 0;
            currentIdx++; playTurn();
        }

        function checkVoting() {
            if(checkWin()) return;
            votingIdx = 0; votes = {};
            const aliveIndices = players.map((_, i) => i).filter(i => players[i].alive);
            aliveIndices.forEach(i => votes[i] = []);
            votes[-1] = []; 
            startVotingTurn();
        }

        function startVotingTurn() {
            const alive = players.map((_, i) => i).filter(i => players[i].alive);
            if(votingIdx >= alive.length) { applyVotes(); return; }
            const voter = players[alive[votingIdx]];
            transition('pass-screen');
            document.getElementById('pass-name').innerText = voter.name;
            document.getElementById('pass-img').src = voter.img;
            document.getElementById('reveal-btn').onclick = () => {
                transition('vote-screen');
                document.getElementById('voter-name').innerText = voter.name;
                const list = document.getElementById('vote-list'); list.innerHTML = "";
                players.forEach((p, i) => { if(p.alive) list.innerHTML += `<div class="vote-card" onclick="recordVote(${i})"><img src="${p.img}"><p style="font-size:0.5rem">${p.name}</p></div>`; });
            };
        }

        function recordVote(tIdx) {
            const alive = players.map((_, i) => i).filter(i => players[i].alive);
            votes[tIdx].push(players[alive[votingIdx]].img);
            votingIdx++; startVotingTurn();
        }

        function applyVotes() {
            let max = 0, victim = -1, tie = false;
            players.forEach((p, i) => {
                if(p.alive) {
                    const c = votes[i].length;
                    if(c > max) { max = c; victim = i; tie = false; }
                    else if(c === max && max > 0) tie = true;
                }
            });
            if(!tie && victim !== -1) { 
                if(players[victim].role === 'Sheriff') transferGun();
                players[victim].alive = false; 
            }
            if(!checkWin()) { round++; startRound(); }
        }

        function checkWin() {
            const alive = players.filter(p => p.alive);
            const m = players.find(p => p.role === 'Murderer');
            const s = players.find(p => p.role === 'Sheriff') || {name: "VACANT", img: ""};
            if(!m.alive) { showWin("INNOCENT VICTORY", m, s, 'blue'); return true; }
            if(alive.length <= 2) { showWin("MURDERER VICTORY", m, s, 'red'); return true; }
            return false;
        }

        function showWin(msg, murderer, sheriff, color) {
            transition('win-screen');
            playSfx('win');
            document.getElementById('win-msg').innerText = msg;
            document.getElementById('win-msg').style.color = color === 'red' ? 'var(--red)' : 'var(--blue)';
            const container = document.getElementById('showdown');
            container.innerHTML = `
                <div class="player-card">
                    <div class="id-frame ${color==='red'?'win-glow-red':''}"><img src="${murderer.img}"></div>
                    <p style="color:var(--red); font-size:0.7rem; margin:5px 0;">MURDERER</p>
                    <p style="font-size:0.6rem;">${murderer.name}</p>
                </div>
                <div class="player-card">
                    <div class="id-frame ${color==='blue'?'win-glow-gold':''}"><img src="${sheriff.img}"></div>
                    <p style="color:var(--gold); font-size:0.7rem; margin:5px 0;">SHERIFF</p>
                    <p style="font-size:0.6rem;">${sheriff.name}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
