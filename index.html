<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MURDER MYSTERY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');
        :root { --red: #ff0000; --bg: #050505; --paper: #e0e0e0; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: #e0e0e0; 
            font-family: 'Special Elite', monospace;
            overflow: hidden; touch-action: manipulation;
        }

        #camera-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; filter: brightness(0.1); }

        .screen { 
            display: none; position: relative; z-index: 10; height: 100vh; width: 100%; 
            flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; 
            background: rgba(10,10,10,0.92); backdrop-filter: blur(8px);
        }
        .active { display: flex; animation: fadeIn 0.5s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn { 
            background: rgba(40,40,40,0.8); border: 1px solid rgba(255,255,255,0.3); color: white; 
            padding: 18px; font-size: 1.1rem; cursor: pointer; width: 90%;
            margin: 10px 0; text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .btn:active { background: var(--red); color: black; box-shadow: 0 0 20px var(--red); }

        /* ID RED GLOWING CIRCLE */
        .id-circle {
            width: 200px; height: 200px; border-radius: 50%;
            border: 5px solid var(--red); object-fit: cover;
            box-shadow: 0 0 25px var(--red), inset 0 0 20px var(--red);
            animation: pulseRed 1.5s infinite;
        }

        @keyframes pulseRed {
            0% { transform: scale(1); box-shadow: 0 0 15px var(--red); }
            50% { transform: scale(1.03); box-shadow: 0 0 35px var(--red); }
            100% { transform: scale(1); box-shadow: 0 0 15px var(--red); }
        }

        .lobby-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; margin-top:15px; }
        .vote-card { border: 1px solid #444; background: #111; padding: 5px; text-align: center; position: relative; }
        .vote-card img { width: 100%; height: 80px; object-fit: cover; }
        
        /* CHIPS SA VOTING */
        .vote-chips { display: flex; flex-wrap: wrap; gap: 2px; justify-content: center; min-height: 25px; margin-top: 5px; }
        .v-chip { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid white; object-fit: cover; }

        #fade-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9999; pointer-events: none; opacity: 0; transition: opacity 0.5s; }

        .winner-pair { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .winner-pair img { width: 130px; height: 130px; border: 4px solid white; object-fit: cover; }
        .winner-pair .murderer-pic { border-color: var(--red); animation: pulseRed 1s infinite; }
    </style>
</head>
<body>

    <video id="camera-bg" autoplay playsinline></video>
    <div id="fade-overlay"></div>

    <div id="menu-screen" class="screen active">
        <h1 style="color:var(--red); font-size: 3rem; letter-spacing: 10px; text-shadow: 0 0 15px var(--red);">MURDER MYSTERY</h1>
        <button class="btn" onclick="startNewGame()">New Game</button>
        <button class="btn" style="opacity:0.5">Continue</button>
    </div>

    <div id="reg-screen" class="screen">
        <video id="reg-video" class="id-circle" autoplay playsinline></video>
        <div style="margin: 10px 0;">
            <button class="btn" style="width: auto; padding: 10px;" onclick="switchCamera()">Switch Camera</button>
        </div>
        <input type="text" id="p-name" placeholder="NAME" style="width:80%; padding:15px; margin:10px 0; background:#000; color:white; border:1px solid var(--red); font-family:inherit;">
        <button class="btn" onclick="registerPlayer()">Identify</button>
        <div id="lobby-list" class="lobby-list" style="max-height: 25vh; overflow-y: auto;"></div>
        <button id="start-btn" class="btn" style="display:none; border-color:white;" onclick="finalizeLobby()">Initialize</button>
    </div>

    <div id="pass-screen" class="screen">
        <h2 style="color:var(--red);">UR TURN:</h2>
        <img id="pass-img" class="id-circle" style="width:160px; height:160px;">
        <h1 id="pass-name">---</h1>
        <button id="reveal-btn" class="btn">Open Data</button>
    </div>

    <div id="role-screen" class="screen">
        <h2 id="role-title" style="font-size:3.5rem; letter-spacing:5px;">---</h2>
        <p>DO NOT SHOW TO OTHERS</p>
        <button class="btn" onclick="finishRoleTurn()">Confirm & Hide</button>
    </div>

    <div id="game-screen" class="screen">
        <div style="position:absolute; top:20px; width:90%; display:flex; justify-content:space-between;">
            <span id="round-label" style="color:red">R1/10</span>
            <span id="task-progress" style="color:white">Tasks: 0/2</span>
        </div>
        <img id="gp-img" style="width:150px; height:150px; border:3px solid white; object-fit:cover; margin-bottom:10px;">
        <h2 id="gp-name">---</h2>
        <div id="action-ui" style="width:100%;">
            <button id="kill-btn" class="btn" style="color:red; border-color:red;" onclick="showTargets()">Eliminate</button>
        </div>
        <button class="btn" onclick="doTask()">Perform Task</button>
        <button class="btn" style="opacity:0.4; border:none;" onclick="endTurn()">Skip</button>
    </div>

    <div id="vote-screen" class="screen">
        <h2 style="font-size:1.2rem;">VOTER: <span id="voter-name" style="color:red">---</span></h2>
        <div id="vote-list" class="lobby-list"></div>
        <button class="btn" style="border-color:gray" onclick="recordVote(-1)">Abstain</button>
    </div>

    <div id="vote-summary-screen" class="screen">
        <h2 style="color:var(--red);">VOTE RESULTS</h2>
        <div id="summary-list" class="lobby-list" style="max-height:60vh; overflow-y:auto;"></div>
        <button class="btn" onclick="finishVotePhase()">Next Cycle</button>
    </div>

    <div id="win-screen" class="screen">
        <h1 id="win-msg" style="text-align:center; font-size:2rem; color:white;">---</h1>
        <div id="win-pics" class="winner-pair"></div>
        <button class="btn" onclick="location.reload()">Restart Game</button>
    </div>

    <div id="target-selector" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:5000; padding:20px; box-sizing:border-box;">
        <h2 style="color:red; text-align:center;">ACQUIRE TARGET</h2>
        <div id="target-btns" class="lobby-list"></div>
        <button class="btn" onclick="document.getElementById('target-selector').style.display='none'">Cancel</button>
    </div>

    <script>
        let players = [];
        let currentIdx = 0;
        let round = 1;
        let votingIdx = 0;
        let votes = {};
        let sequence = [];
        let currentFacingMode = "user";
        let winAudio = new Audio('win.mp3');
        let sfxRole = new Audio('https://www.soundjay.com/buttons/sounds/button-16.mp3');

        function speak(txt) {
            const msg = new SpeechSynthesisUtterance(txt);
            msg.rate = 0.8; msg.pitch = 0.7;
            window.speechSynthesis.speak(msg);
        }

        function transition(id) {
            const overlay = document.getElementById('fade-overlay');
            overlay.style.opacity = '1';
            setTimeout(() => {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                overlay.style.opacity = '0';
            }, 400);
        }

        async function startNewGame() {
            transition('reg-screen');
            initCamera();
        }

        async function initCamera() {
            if(window.stream) window.stream.getTracks().forEach(t => t.stop());
            const constraints = { video: { facingMode: currentFacingMode } };
            window.stream = await navigator.mediaDevices.getUserMedia(constraints);
            document.getElementById('reg-video').srcObject = window.stream;
            document.getElementById('camera-bg').srcObject = window.stream;
        }

        function switchCamera() {
            currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
            initCamera();
        }

        function registerPlayer() {
            const name = document.getElementById('p-name').value;
            if(!name) return;
            const canvas = document.createElement('canvas'); canvas.width = 400; canvas.height = 400;
            canvas.getContext('2d').drawImage(document.getElementById('reg-video'), 0, 0, 400, 400);
            const img = canvas.toDataURL();
            players.push({ name, img, role: '', alive: true, tasks: 0 });
            document.getElementById('lobby-list').innerHTML += `<div class="vote-card"><img src="${img}" style="border-radius:50%"><p>${name}</p></div>`;
            speak("Operative " + name + " identified.");
            document.getElementById('p-name').value = "";
            if(players.length >= 3) document.getElementById('start-btn').style.display = 'block';
        }

        function finalizeLobby() {
            let roles = ['Murderer', 'Sheriff']; while(roles.length < players.length) roles.push('Innocent');
            roles = roles.sort(() => Math.random() - 0.5);
            players.forEach((p, i) => p.role = roles[i]);
            currentIdx = 0;
            startRolePass();
        }

        function startRolePass() {
            transition('pass-screen');
            document.getElementById('pass-name').innerText = players[currentIdx].name;
            document.getElementById('pass-img').src = players[currentIdx].img;
            document.getElementById('reveal-btn').onclick = () => {
                transition('role-screen');
                sfxRole.play();
                const p = players[currentIdx];
                const title = document.getElementById('role-title');
                title.innerText = p.role.toUpperCase();
                title.style.color = p.role === 'Murderer' ? 'red' : (p.role === 'Sheriff' ? 'gold' : 'white');
            };
        }

        function finishRoleTurn() {
            currentIdx++;
            if(currentIdx < players.length) startRolePass();
            else { currentIdx = 0; startRound(); }
        }

        function startRound() {
            if(round > 10) { checkWin(true); return; }
            sequence = players.map((_, i) => i).filter(i => players[i].alive);
            currentIdx = 0;
            playTurn();
        }

        function playTurn() {
            const p = players[sequence[currentIdx]];
            transition('pass-screen');
            document.getElementById('pass-name').innerText = p.name;
            document.getElementById('pass-img').src = p.img;
            document.getElementById('reveal-btn').onclick = () => {
                transition('game-screen');
                document.getElementById('round-label').innerText = `R${round}/10`;
                document.getElementById('gp-name').innerText = p.name;
                document.getElementById('gp-img').src = p.img;
                document.getElementById('task-progress').innerText = `Tasks: ${p.tasks}/2`;
                document.getElementById('kill-btn').style.display = (p.role === 'Innocent') ? 'none' : 'block';
            };
        }

        function doTask() {
            const p = players[sequence[currentIdx]];
            p.tasks++; 
            document.getElementById('task-progress').innerText = `Tasks: ${p.tasks}/2`;
            if(p.tasks >= 2) { speak("Task complete."); setTimeout(endTurn, 800); }
        }

        function showTargets() {
            document.getElementById('target-selector').style.display = 'block';
            const btns = document.getElementById('target-btns');
            btns.innerHTML = "";
            players.forEach((p, i) => {
                if(p.alive && i !== sequence[currentIdx]) {
                    btns.innerHTML += `<div class="vote-card" onclick="kill(${i})"><img src="${p.img}"><p>${p.name}</p></div>`;
                }
            });
        }

        function kill(idx) {
            const shooter = players[sequence[currentIdx]];
            if(shooter.role === 'Murderer') players[idx].alive = false;
            else if(shooter.role === 'Sheriff') {
                if(players[idx].role === 'Murderer') players[idx].alive = false;
                else shooter.alive = false;
            }
            document.getElementById('target-selector').style.display = 'none';
            endTurn();
        }

        function endTurn() {
            players[sequence[currentIdx]].tasks = 0;
            currentIdx++;
            if(currentIdx < sequence.length) playTurn();
            else checkVoting();
        }

        function checkVoting() {
            if(checkWin()) return;
            votingIdx = 0; votes = {};
            players.forEach((p,i) => { if(p.alive) votes[i] = []; });
            votes[-1] = [];
            startVotingTurn();
        }

        function startVotingTurn() {
            const aliveIdxs = players.map((_, i) => i).filter(i => players[i].alive);
            const voter = players[aliveIdxs[votingIdx]];
            transition('pass-screen');
            document.getElementById('pass-name').innerText = voter.name;
            document.getElementById('pass-img').src = voter.img;
            document.getElementById('reveal-btn').onclick = () => {
                transition('vote-screen');
                document.getElementById('voter-name').innerText = voter.name;
                const list = document.getElementById('vote-list');
                list.innerHTML = "";
                players.forEach((p, i) => {
                    if(p.alive) list.innerHTML += `<div class="vote-card" onclick="recordVote(${i})"><img src="${p.img}"><p>${p.name}</p></div>`;
                });
            };
        }

        function recordVote(targetIdx) {
            const aliveIdxs = players.map((_, i) => i).filter(i => players[i].alive);
            const voter = players[aliveIdxs[votingIdx]];
            votes[targetIdx].push(voter.img);
            votingIdx++;
            if(votingIdx < aliveIdxs.length) startVotingTurn();
            else showSummary();
        }

        function showSummary() {
            transition('vote-summary-screen');
            const list = document.getElementById('summary-list');
            list.innerHTML = "";
            let max = 0; let victim = -1; let tie = false;

            players.forEach((p, i) => {
                if(p.alive) {
                    const count = votes[i].length;
                    let chips = ''; 
                    votes[i].forEach(imgSrc => chips += `<img src="${imgSrc}" class="v-chip">`);
                    list.innerHTML += `<div class="vote-card"><img src="${p.img}"><p>${p.name}</p><div class="vote-chips">${chips}</div></div>`;
                    if(count > max) { max = count; victim = i; tie = false; }
                    else if(count === max && max > 0) tie = true;
                }
            });

            if(!tie && victim !== -1) {
                players[victim].alive = false;
                speak(players[victim].name + " was exiled.");
            } else {
                speak("No consensus reached.");
            }
        }

        function finishVotePhase() {
            if(!checkWin()) { round++; startRound(); }
        }

        function checkWin(timeOut = false) {
            const alive = players.filter(p => p.alive);
            const murderer = players.find(p => p.role === 'Murderer');
            const sheriff = players.find(p => p.role === 'Sheriff');

            if(!murderer.alive) { 
                showWin("HERO SAVED THE DAY / INNOCENTS WIN", sheriff, murderer); 
                return true; 
            }
            if(alive.length <= 2 || timeOut) { 
                showWin("MURDERER WINS", murderer, sheriff); 
                return true; 
            }
            return false;
        }

        function showWin(msg, winner, loser) {
            transition('win-screen');
            winAudio.play();
            speak(msg);
            document.getElementById('win-msg').innerText = msg;
            
            const winBox = document.getElementById('win-pics');
            winBox.innerHTML = `
                <div style="text-align:center">
                    <img src="${winner.img}" class="${winner.role==='Murderer' ? 'murderer-pic' : ''}" style="width:130px; height:130px; border-radius:10px;">
                    <p>${winner.name}<br>(${winner.role})</p>
                </div>
                <div style="text-align:center">
                    <img src="${loser.img}" style="width:130px; height:130px; border-radius:10px; filter:grayscale(1); opacity:0.6;">
                    <p>${loser.name}<br>(${loser.role})</p>
                </div>
            `;
        }
    </script>
</body>
</html>
